<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fund Tracker Pro</title>
  <meta name="theme-color" content="#1e293b">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  
  <script>window.__splashStartTime = Date.now();</script>

  <style>
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.5); }
    }
    @keyframes splash-loading-raw {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-500">
  
  <div id="global-splash" style="position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f8fafc; transition: opacity 0.5s ease;">
  <div style="position:relative; display:flex; align-items:center; justify-content:center; width:6rem; height:6rem; margin-bottom:1.5rem; border-radius:1.5rem; background:linear-gradient(to top right, #2563eb, #6366f1); box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.3); animation: splash-pulse 2s ease-in-out infinite;">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
    </svg>
    <div style="position:absolute; inset:0; border-radius:1.5rem; border: 2px solid rgba(255,255,255,0.2);"></div>
  </div>
  <h1 style="font-size:1.875rem; font-weight:800; color:#0f172a; letter-spacing:-0.025em; margin:0;">
    Fund Tracker <span style="background-clip:text; -webkit-background-clip:text; color:transparent; background-image:linear-gradient(to right, #3b82f6, #6366f1);">Pro</span>
  </h1>
  <p style="margin-top:1rem; color:#64748b; font-size:0.875rem; font-weight:500;">您的专属资产洞察中心</p>
  <div style="position:absolute; bottom:4rem; display:flex; flex-direction:column; align-items:center;">
     <div style="width:12rem; height:0.25rem; background-color:rgba(148, 163, 184, 0.2); border-radius:9999px; overflow:hidden;">
        <div style="height:100%; width:50%; background-image:linear-gradient(to right, #3b82f6, #6366f1); border-radius:9999px; animation: splash-loading-raw 2s ease-in-out infinite;"></div>
     </div>
  </div>
</div>

  <div id="root"></div>
  
  <script type="module" src="/src/main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('PWA 已激活:', reg.scope))
          .catch(err => console.error('PWA 注册失败:', err));
      });
    }
  </script>
</body>
</html>
